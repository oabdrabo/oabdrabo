<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>
  html,body{margin:0}
  body{width:1280px;height:340px;font-family:-apple-system,"Segoe UI",Roboto,Arial,sans-serif;overflow:hidden;
    background:radial-gradient(130% 150% at 18% 8%,#181c24 0%,#0e1014 55%,#0b0d10 100%);color:#e6edf3}
  .wrap{width:100%;height:100%;display:flex;align-items:center;gap:44px;padding:0 68px;box-sizing:border-box;position:relative}
  .emoji{font-size:104px;line-height:1}
  .eyebrow{font-family:ui-monospace,Menlo,monospace;font-size:15px;letter-spacing:4px;font-weight:600;color:#5ec8d8}
  h1{font-size:80px;font-weight:800;margin:8px 0 12px;letter-spacing:-1px;color:#f4f6f8}
  .strap{font-size:22px;font-weight:600;color:#8b95a3}
  .bar{position:absolute;left:0;right:0;bottom:0;height:5px;background:linear-gradient(90deg,#7c5cff,#3fb9c9)}
  body.light{background:radial-gradient(130% 150% at 18% 8%,#ffffff 0%,#f2f4f7 60%,#eceff3 100%);color:#1a2028}
  body.light .eyebrow{color:#2b8f9e}
  body.light h1{color:#12151a}
  body.light .strap{color:#5b6472}
</style></head><body>
  <div class="wrap">
    <div class="emoji">👋</div>
    <div>
      <div class="eyebrow">AUTONOMOUS INFRASTRUCTURE OPERATIONS</div>
      <h1>PYXIS3</h1>
      <div class="strap">Autonomous AI for cloud &amp; data-center infrastructure operations.</div>
    </div>
  </div>
  <div class="bar"></div>
  <script>if(new URLSearchParams(location.search).get('theme')==='light')document.body.classList.add('light')</script>
</body></html>
